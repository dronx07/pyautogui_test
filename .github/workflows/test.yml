name: PyAutoGUI CI Test

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-pyautogui:
    runs-on: ubuntu-latest

    env:
      DISPLAY: :99
      PYTHONUNBUFFERED: "1"
      XAUTHORITY: /dev/null

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            fluxbox \
            scrot \
            x11-utils \
            xdotool \
            xclip \
            python3-tk \
            python3-dev \
            python3-xlib \
            libxtst6 \
            libxrandr2 \
            libxss1 \
            gnome-screenshot \
            chromium-browser

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pyautogui pillow

      - name: Start virtual display
        run: |
          echo "Starting Xvfb..."
          Xvfb :99 -screen 0 1920x1080x24 -ac &

          sleep 3

          echo "Starting Fluxbox window manager..."
          fluxbox &

          sleep 3

          echo "Display info:"
          xdpyinfo -display :99

      - name: Verify screenshot works
        run: |
          export DISPLAY=:99
          echo "Testing screenshot capability..."
          scrot pre_test.png
          ls -lah *.png

      - name: Set Chromium as default browser
        run: |
          export DISPLAY=:99
          echo "Setting Chromium as default browser..."
          export BROWSER=chromium-browser

      - name: Run PyAutoGUI tests
        run: |
          export DISPLAY=:99
          export BROWSER=chromium-browser
          echo "Running PyAutoGUI tests..."
          python test.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyautogui-screenshots
          path: |
            *.png
          retention-days: 7

      - name: Debug info
        if: failure()
        run: |
          echo "Debug information:"
          python --version
          echo "DISPLAY=$DISPLAY"
          echo "XAUTHORITY=$XAUTHORITY"
          ps aux | grep -E "Xvfb|fluxbox|chromium" || true
