name: PyAutoGUI Test

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-pyautogui:
    runs-on: ubuntu-latest

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            scrot \
            x11-utils \
            xdotool \
            xclip \
            fluxbox \
            python3-tk \
            python3-dev \
            python3-xlib \
            libxtst6 \
            libxrandr2 \
            libxss1\
            gnome-screenshot

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyautogui pillow

      - name: Run PyAutoGUI tests (virtual display)
        run: |
          echo "Starting tests using Xvfb virtual display"
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python test.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyautogui-screenshots
          path: |
            *.png
            screenshot_*.png
            test_sequence_*.png
          retention-days: 7

      - name: Debug information
        if: failure()
        run: |
          echo "Debug info:"
          python --version
          ps aux | grep Xvfb || true
