name: Test PyAutoGUI in GitHub Actions

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-pyautogui:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          xvfb \
          x11vnc \
          fluxbox \
          scrot \
          python3-tk \
          python3-dev \
          xclip \
          xdotool
        echo "✅ System dependencies installed"
    
    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip
        pip install pyautogui
        echo "✅ Python packages installed"
    
    - name: Start virtual display
      run: |
        # Start Xvfb
        Xvfb :99 -screen 0 1920x1080x24 -ac &
        echo "✅ Xvfb started"
        
        # Wait for Xvfb
        sleep 3
        
        # Set display
        echo "DISPLAY=:99" >> $GITHUB_ENV
        export DISPLAY=:99
        
        # Verify display
        xdpyinfo -display :99 || echo "⚠️ xdpyinfo failed but continuing"
        
        # Start fluxbox window manager (optional)
        fluxbox &
        echo "✅ Fluxbox started"
        
        sleep 2
    
    - name: Run PyAutoGUI tests
      env:
        DISPLAY: :99
        PYTHONUNBUFFERED: 1
      run: |
        echo "📸 Running PyAutoGUI tests..."
        python test_pyautogui.py
    
    - name: Upload screenshots
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-screenshots-${{ matrix.python-version }}
        path: |
          *.png
          screenshot_*.png
          test_sequence_*.png
        retention-days: 7
    
    - name: Debug info
      if: failure()
      run: |
        echo "🔍 Debug information:"
        echo "Python version: $(python --version)"
        echo "DISPLAY: $DISPLAY"
        echo "Processes:"
        ps aux | grep -E "Xvfb|fluxbox"
        echo "Display info:"
        xdpyinfo -display :99 2>&1 || echo "Cannot get display info"
